<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja um Parceiro | V.I. Company</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { viBlue: '#003366', viGold: '#C5A059', viLight: '#F8FAFC' } } } }
    </script>
</head>
<body class="bg-viLight font-sans text-gray-800">

    <nav class="bg-white shadow-md fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-20 items-center">
            <a href="index.html"><img class="h-12" src="assets/img/logo-texto.png" alt="V.I. Company"></a>
            <a href="index.html" class="text-gray-600 hover:text-viBlue">← Voltar ao site</a>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div class="max-w-2xl mx-auto bg-white p-10 rounded-lg shadow-xl">
            <h2 class="text-3xl font-bold text-viBlue mb-2 text-center">Fale com a Diretoria</h2>
            <p class="text-center text-gray-500 mb-8">Preencha os dados abaixo e faremos um diagnóstico inicial da sua operação.</p>
            
            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Nome do Empresário</label>
                    <input type="text" class="w-full px-4 py-3 border rounded focus:outline-none focus:border-viGold" placeholder="Seu nome completo">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">Empresa</label>
                        <input type="text" class="w-full px-4 py-3 border rounded focus:outline-none focus:border-viGold" placeholder="Nome do seu negócio">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">Qual seu maior gargalo hoje?</label>
                        <select class="w-full px-4 py-3 border rounded focus:outline-none focus:border-viGold bg-white">
                            <option>Organização de Escalas (RH)</option>
                            <option>Processos Jurídicos/Compliance</option>
                            <option>Marketing e Design</option>
                            <option>Gestão Financeira</option>
                            <option>Outros</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">Sua visão ou parâmetro</label>
                    <textarea class="w-full px-4 py-3 border rounded focus:outline-none focus:border-viGold" rows="4" placeholder="Descreva brevemente o que você espera que a V.I. Company assuma para você..."></textarea>
                </div>
                <button type="submit" class="w-full bg-viBlue text-white font-bold py-4 rounded hover:bg-viGold transition shadow-lg">
                    Solicitar Diagnóstico
                </button>
            </form>
        </div>
    </section>
</body>
</html>
