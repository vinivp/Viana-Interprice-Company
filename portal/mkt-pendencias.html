<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Marketing | V.I. Company</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../assets/js/supabase-config.js"></script>
    <script type="module" src="../assets/js/auth-guard.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { viBlue: '#003366', viGold: '#C5A059', viLight: '#F8FAFC' } } } }
    </script>
</head>
<body class="bg-viLight font-sans flex">
    <aside class="w-64 bg-viBlue min-h-screen text-white p-6 shadow-2xl hidden md:flex flex-col">
        <img class="h-10 mb-12 mx-auto" src="../assets/img/logo-texto.png">
        <nav class="space-y-4">
            <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded hover:bg-white/10 transition">← Voltar Dashboard</a>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-viBlue">Campanhas em Aprovação</h1>
            <p class="text-gray-500">Validadas pelo nosso Jurídico, aguardando seu parecer final.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100">
                <div class="h-64 bg-gray-200 flex items-center justify-center text-gray-400 italic">
                    [ PRÉVIA DA ARTE / VÍDEO ]
                </div>
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-viBlue text-lg">Campanha: Queima de Estoque</h3>
                            <p class="text-xs text-green-600 font-bold">✓ Validado Juridicamente</p>
                        </div>
                        <span class="bg-viLight text-viBlue text-xs px-2 py-1 rounded">Instagram / FB</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-6">Legenda sugerida: "Aproveite as ofertas exclusivas da semana! 🚀 #Promoção"</p>
                    <div class="flex gap-4">
                        <button class="flex-1 bg-viBlue text-white font-bold py-2 rounded hover:bg-viGold transition">Aprovar Publicação</button>
                        <button class="flex-1 border border-red-500 text-red-500 font-bold py-2 rounded hover:bg-red-50 transition">Solicitar Ajuste</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
